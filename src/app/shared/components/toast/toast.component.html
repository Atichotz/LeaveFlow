@if (toast()) {
  <div class="fixed bottom-6 right-6 z-50">
    <div
      [class]="colorClasses()"
      class="flex items-center gap-3 rounded-xl border px-4 py-3 shadow-lg animate-slide-right"
    >
      <fa-icon [icon]="icon()" class="text-lg" />
      <span class="text-sm font-medium">{{ toast()!.message }}</span>
    </div>
  </div>
}
