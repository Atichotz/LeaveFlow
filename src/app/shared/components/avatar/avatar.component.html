@if (user().avatarUrl) {
  <img
    [src]="user().avatarUrl"
    [alt]="user().name"
    [class]="sizeClasses()"
    class="rounded-full object-cover"
  />
} @else {
  <div
    [class]="sizeClasses()"
    class="flex flex-shrink-0 items-center justify-center rounded-full bg-primary-light font-semibold text-primary"
  >
    {{ initials() }}
  </div>
}
