@if (visible()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm"
    (click)="cancel()"
  ></div>

  <!-- Dialog: bottom-sheet on mobile, centered modal on sm+ -->
  <div class="fixed inset-0 z-50 flex items-end p-0 sm:items-center sm:p-4">
    <div class="w-full rounded-t-2xl bg-white p-6 shadow-xl sm:max-w-md sm:rounded-xl sm:mx-auto">
      <h3 class="text-lg font-semibold text-gray-800">ยืนยันการปฏิเสธคำขอลา</h3>
      <p class="mt-1 text-sm text-gray-500">ระบุเหตุผล (ไม่บังคับ) เพื่อแจ้งให้พนักงานทราบ</p>

      <div class="form-field mt-4">
        <label class="form-label">เหตุผลการปฏิเสธ</label>
        <textarea
          class="form-input min-h-24 resize-none"
          placeholder="เช่น กรุณายื่นล่วงหน้าอย่างน้อย 3 วัน..."
          [ngModel]="reason()"
          (ngModelChange)="reason.set($event)"
        ></textarea>
      </div>

      <div class="mt-5 flex justify-end gap-2">
        <button class="btn-outline" (click)="cancel()">ยกเลิก</button>
        <button class="btn-danger" (click)="confirm()">ยืนยันการปฏิเสธ</button>
      </div>
    </div>
  </div>
}
